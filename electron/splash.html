<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KTM Launcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-0: #05060a;
      --bg-1: #0a0d18;
      --ink: #eaf2ff;
      --muted: #7c8aa8;
      --brand: #7c5cff;
      --brand-2: #22d3ee;
      --brand-3: #ff4d8d;
      --ring: rgba(124, 92, 255, 0.55);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Space Grotesk', 'Cairo', system-ui, sans-serif;
      color: var(--ink);
      background: var(--bg-0);
      overflow: hidden;
      -webkit-app-region: drag;
      -webkit-user-select: none;
      user-select: none;
      position: relative;
    }

    /* Deep space gradient base */
    .stage {
      position: fixed; inset: 0;
      background:
        radial-gradient(1200px 800px at 20% -10%, rgba(124,92,255,0.28), transparent 60%),
        radial-gradient(900px 700px at 110% 20%, rgba(34,211,238,0.22), transparent 60%),
        radial-gradient(700px 700px at 50% 120%, rgba(255,77,141,0.18), transparent 60%),
        linear-gradient(180deg, #04050a 0%, #080b16 50%, #04050a 100%);
    }

    /* Animated mesh grid */
    .mesh {
      position: absolute; inset: -1px;
      background-image:
        linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(ellipse at center, black 40%, transparent 85%);
      animation: drift 30s linear infinite;
    }
    @keyframes drift {
      from { background-position: 0 0, 0 0; }
      to   { background-position: 440px 440px, 440px 440px; }
    }

    /* Floating orbs */
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(60px); opacity: 0.55; pointer-events: none;
      mix-blend-mode: screen;
    }
    .orb.a { width: 520px; height: 520px; background: #7c5cff; top: -140px; right: -120px; animation: float1 12s ease-in-out infinite; }
    .orb.b { width: 480px; height: 480px; background: #22d3ee; bottom: -160px; left: -140px; animation: float2 14s ease-in-out infinite; }
    .orb.c { width: 360px; height: 360px; background: #ff4d8d; top: 40%; left: 55%; animation: float3 16s ease-in-out infinite; }
    @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-40px,30px)} }
    @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,-40px)} }
    @keyframes float3 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-20px,-20px) scale(1.08)} }

    /* Particle canvas */
    #particles { position: absolute; inset: 0; }

    /* Central card */
    .wrap {
      position: relative; z-index: 3;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }

    .card {
      position: relative;
      display: flex; flex-direction: column; align-items: center;
      padding: 44px 56px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(20,24,40,0.55), rgba(10,12,22,0.35));
      backdrop-filter: blur(24px) saturate(140%);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        0 30px 90px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.08);
      animation: rise 0.9s cubic-bezier(.2,.9,.2,1) both;
    }
    @keyframes rise { from { opacity: 0; transform: translateY(24px) scale(.98); } to { opacity: 1; transform: none; } }

    /* Logo */
    .logo {
      position: relative;
      width: 132px; height: 132px;
      display: grid; place-items: center;
      margin-bottom: 26px;
    }
    .logo .ring {
      position: absolute; inset: -14px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #7c5cff, #22d3ee, #ff4d8d, #7c5cff);
      filter: blur(2px);
      animation: spin 6s linear infinite;
      opacity: 0.9;
    }
    .logo .ring::after {
      content: ''; position: absolute; inset: 6px;
      border-radius: 50%; background: #05060a;
    }
    .logo .core {
      position: relative; z-index: 2;
      width: 108px; height: 108px; border-radius: 26px;
      background:
        radial-gradient(120% 120% at 20% 0%, rgba(124,92,255,0.9), rgba(34,211,238,0.7) 60%, rgba(255,77,141,0.6));
      display: grid; place-items: center;
      box-shadow: 0 10px 40px rgba(124,92,255,0.55), inset 0 1px 0 rgba(255,255,255,0.35);
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 42px; letter-spacing: 1px; color: white;
      text-shadow: 0 2px 20px rgba(0,0,0,0.35);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .brand {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 34px; letter-spacing: 2px;
      background: linear-gradient(90deg, #ffffff, #b9c6ff 60%, #7cf0ff);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      margin-bottom: 6px;
    }
    .tagline {
      font-family: 'Cairo', sans-serif;
      font-size: 13px; color: var(--muted); letter-spacing: 1px;
      margin-bottom: 30px;
    }

    /* Progress track */
    .track {
      width: 320px; height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 999px; overflow: hidden;
      position: relative;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .track .bar {
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, #7c5cff, #22d3ee, transparent);
      background-size: 40% 100%;
      background-repeat: no-repeat;
      animation: sweep 1.8s ease-in-out infinite;
      filter: drop-shadow(0 0 8px rgba(124,92,255,0.7));
    }
    @keyframes sweep {
      0% { background-position: -20% 0; }
      100% { background-position: 120% 0; }
    }

    .status {
      margin-top: 18px;
      font-family: 'Cairo', sans-serif;
      font-size: 13px; color: #cfd7ea;
      min-height: 18px;
      opacity: 0.9;
    }
    .status .dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: #22d3ee; margin-inline-end: 8px; vertical-align: middle;
      box-shadow: 0 0 10px #22d3ee;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

    .footer {
      position: absolute; bottom: 22px; left: 0; right: 0;
      text-align: center;
      color: rgba(255,255,255,0.35);
      font-size: 11px; letter-spacing: 2px; font-family: 'Space Grotesk';
    }
    .footer strong { color: rgba(255,255,255,0.6); font-weight: 500; }

    /* Corner chips */
    .chip {
      position: absolute; top: 18px;
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 12px;
      font-family: 'Space Grotesk'; font-size: 11px; letter-spacing: 1.5px;
      color: #bcc6e0; text-transform: uppercase;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      backdrop-filter: blur(10px);
    }
    .chip.left { left: 18px; }
    .chip.right { right: 18px; }
    .chip .live { width: 6px; height: 6px; border-radius: 50%; background: #22ff9c; box-shadow: 0 0 8px #22ff9c; animation: pulse 1.2s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="stage"></div>
  <div class="mesh"></div>
  <div class="orb a"></div>
  <div class="orb b"></div>
  <div class="orb c"></div>
  <canvas id="particles"></canvas>

  <div class="chip left"><span class="live"></span> SYSTEM ONLINE</div>
  <div class="chip right">v1.3.0 · 2026</div>

  <div class="wrap">
    <div class="card">
      <div class="logo">
        <div class="ring"></div>
        <div class="core">K</div>
      </div>
      <div class="brand">KTM LAUNCHER</div>
      <div class="tagline">تجربة ألعاب من الجيل القادم</div>

      <div class="track"><div class="bar"></div></div>
      <div class="status" id="status"><span class="dot"></span><span id="status-text">جاري تهيئة النظام…</span></div>
    </div>
  </div>

  <div class="footer">© 2026 KTM GAMES · <strong>NEXT-GEN GAMING PLATFORM</strong></div>

  <script>
    // Rotating status
    const messages = [
      'جاري تهيئة النظام…',
      'الاتصال بخوادم الألعاب…',
      'تحميل المكتبة…',
      'تحضير الواجهة…',
      'اللمسات الأخيرة…'
    ];
    let idx = 0;
    const el = document.getElementById('status-text');
    setInterval(() => { idx = (idx + 1) % messages.length; el.textContent = messages[idx]; }, 1400);

    // Particles
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let W, H, particles;
    const colors = ['#7c5cff', '#22d3ee', '#ff4d8d', '#ffffff'];
    function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
    function init() {
      particles = Array.from({ length: 70 }, () => ({
        x: Math.random() * W, y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4,
        r: Math.random() * 1.8 + 0.4,
        c: colors[Math.floor(Math.random() * colors.length)],
        a: Math.random() * 0.6 + 0.2
      }));
    }
    function tick() {
      ctx.clearRect(0, 0, W, H);
      for (const p of particles) {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > W) p.vx *= -1;
        if (p.y < 0 || p.y > H) p.vy *= -1;
        ctx.beginPath();
        ctx.fillStyle = p.c;
        ctx.globalAlpha = p.a;
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      requestAnimationFrame(tick);
    }
    addEventListener('resize', () => { resize(); init(); });
    resize(); init(); tick();
  </script>
</body>
</html>
